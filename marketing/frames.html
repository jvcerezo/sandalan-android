<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sandalan Play Store Assets</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 30px; }
  h1 { font-size: 28px; margin-bottom: 5px; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
  h2 { color: #3DB676; margin: 30px 0 15px; font-size: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
  .frame-container { text-align: center; }
  .frame-container .label { font-size: 11px; color: #666; margin-top: 6px; }
  canvas { cursor: pointer; border: 1px solid #222; }
  canvas:hover { border-color: #3DB676; }
  button { background: #3DB676; color: #000; border: none; padding: 14px 28px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin: 5px; }
  button:hover { background: #2D8B5E; color: #fff; }
  .controls { margin-bottom: 20px; }
</style>
</head>
<body>

<h1>Sandalan — Play Store Assets</h1>
<p class="subtitle">Click any image to download it, or use "Download All"</p>
<div class="controls">
  <button onclick="downloadAll('phone')">Download Phone (8)</button>
  <button onclick="downloadAll('tablet7')">Download 7" Tablet (8)</button>
  <button onclick="downloadAll('tablet10')">Download 10" Tablet (8)</button>
  <button onclick="downloadFeature()">Download Feature Graphic</button>
</div>

<h2>Feature Graphic (1024×500)</h2>
<div class="row">
  <div class="frame-container">
    <canvas id="feature" width="1024" height="500"></canvas>
    <div class="label">feature_graphic.png</div>
  </div>
</div>

<h2>Phone Screenshots (1080×1920)</h2>
<div class="row" id="phone-row"></div>

<h2>7" Tablet (1200×1920)</h2>
<div class="row" id="tablet7-row"></div>

<h2>10" Tablet (1600×2560)</h2>
<div class="row" id="tablet10-row"></div>

<script>
const SCREENS = [
  { file: 'raw/01_home.png', headline: 'Your Filipino\nAdulting Companion', color: '#2D8B5E' },
  { file: 'raw/02_dashboard.png', headline: 'Smart Financial\nDashboard', color: '#3B82F6' },
  { file: 'raw/03_guide.png', headline: 'Level Up Through\nEvery Life Stage', color: '#8B5CF6' },
  { file: 'raw/04_transactions.png', headline: 'Track Every\nPeso You Spend', color: '#22C55E' },
  { file: 'raw/05_tools.png', headline: 'SSS, PhilHealth\nBIR & More', color: '#F97316' },
  { file: 'raw/06_contributions.png', headline: 'Know Your\nContributions', color: '#14B8A6' },
  { file: 'raw/07_ai_chat.png', headline: 'AI Assistant\nThat Speaks Taglish', color: '#A855F7' },
  { file: 'raw/08_settings.png', headline: 'Fully\nCustomizable', color: '#64748B' },
];

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

async function drawFrame(canvas, screen, W, H) {
  const ctx = canvas.getContext('2d');
  const img = await loadImage(screen.file);

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, screen.color + '30');
  grad.addColorStop(0.3, '#0A1410');
  grad.addColorStop(1, '#0A1410');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle radial glow
  const rgr = ctx.createRadialGradient(W / 2, H * 0.15, 0, W / 2, H * 0.15, W * 0.6);
  rgr.addColorStop(0, screen.color + '18');
  rgr.addColorStop(1, 'transparent');
  ctx.fillStyle = rgr;
  ctx.fillRect(0, 0, W, H);

  // Headline text
  const s = W / 1080;
  const lines = screen.headline.split('\n');
  ctx.textAlign = 'center';
  lines.forEach((line, i) => {
    ctx.font = `800 ${Math.round(52 * s)}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(line, W / 2, 100 * s + i * 68 * s);
  });

  // Phone frame
  const phoneW = W * 0.62;
  const phoneH = phoneW * (2400 / 1080);
  const phoneX = (W - phoneW) / 2;
  const phoneY = H - phoneH + phoneH * 0.08;
  const bezelR = 28 * s;

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 40 * s;
  ctx.shadowOffsetY = 10 * s;

  // Bezel
  roundRect(ctx, phoneX - 6 * s, phoneY - 6 * s, phoneW + 12 * s, phoneH + 12 * s, bezelR + 4 * s);
  ctx.fillStyle = '#1a1a1a';
  ctx.fill();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // Screen with screenshot
  ctx.save();
  roundRect(ctx, phoneX, phoneY, phoneW, phoneH, bezelR);
  ctx.clip();
  ctx.drawImage(img, phoneX, phoneY, phoneW, phoneH);
  ctx.restore();

  // Thin border on bezel
  roundRect(ctx, phoneX - 6 * s, phoneY - 6 * s, phoneW + 12 * s, phoneH + 12 * s, bezelR + 4 * s);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Sandalan logo text at bottom
  ctx.font = `600 ${Math.round(14 * s)}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText('Sandalan', W / 2, H - 20 * s);
}

async function drawFeature() {
  const c = document.getElementById('feature');
  const ctx = c.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0, 0, 1024, 500);
  grad.addColorStop(0, '#0A1410');
  grad.addColorStop(0.4, '#0F1F17');
  grad.addColorStop(1, '#162E21');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1024, 500);

  // Radial glow
  const rgr = ctx.createRadialGradient(700, 250, 0, 700, 250, 500);
  rgr.addColorStop(0, 'rgba(61,182,118,0.12)');
  rgr.addColorStop(1, 'transparent');
  ctx.fillStyle = rgr;
  ctx.fillRect(0, 0, 1024, 500);

  // App name
  ctx.textAlign = 'left';
  ctx.font = '800 80px "Segoe UI", sans-serif';
  ctx.fillStyle = '#F3F6F4';
  ctx.fillText('Sandal', 80, 220);
  const sw = ctx.measureText('Sandal').width;
  ctx.fillStyle = '#3DB676';
  ctx.fillText('an', 80 + sw, 220);

  // Tagline
  ctx.font = '400 22px "Segoe UI", sans-serif';
  ctx.fillStyle = '#8A948D';
  ctx.fillText('Your Filipino Adulting Companion', 82, 260);

  // Feature pills
  ctx.font = '600 13px "Segoe UI", sans-serif';
  const pills = ['💰 Finance', '📖 Guides', '🤖 AI Chat', '📷 Scanner', '🛠️ Tools'];
  let px = 82;
  pills.forEach(pill => {
    const tw = ctx.measureText(pill).width;
    roundRect(ctx, px, 290, tw + 28, 34, 17);
    ctx.fillStyle = 'rgba(61,182,118,0.12)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(61,182,118,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#3DB676';
    ctx.textAlign = 'left';
    ctx.fillText(pill, px + 14, 312);
    px += tw + 40;
  });

  // Phone mockup on right side
  try {
    const img = await loadImage('raw/01_home.png');
    const ph = 420;
    const pw = ph * (1080 / 2400);
    const ppx = 820;
    const ppy = 45;

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 30;
    ctx.shadowOffsetY = 8;
    roundRect(ctx, ppx - 4, ppy - 4, pw + 8, ph + 8, 16);
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();
    ctx.shadowColor = 'transparent';

    roundRect(ctx, ppx, ppy, pw, ph, 14);
    ctx.clip();
    ctx.drawImage(img, ppx, ppy, pw, ph);
    ctx.restore();

    roundRect(ctx, ppx - 4, ppy - 4, pw + 8, ph + 8, 16);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();
  } catch(e) {}

  // PH flag accent at bottom
  ctx.fillStyle = '#0038A8'; ctx.globalAlpha = 0.5; ctx.fillRect(0, 496, 342, 4);
  ctx.fillStyle = '#CE1126'; ctx.fillRect(342, 496, 340, 4);
  ctx.fillStyle = '#FCD116'; ctx.fillRect(682, 496, 342, 4);
  ctx.globalAlpha = 1;

  c.onclick = () => download(c, 'feature_graphic');
}

async function generateScreenshots(containerId, W, H, prefix) {
  const container = document.getElementById(containerId);
  for (const screen of SCREENS) {
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    canvas.style.height = '300px';
    canvas.style.width = `${300 * W / H}px`;

    const div = document.createElement('div');
    div.className = 'frame-container';
    div.appendChild(canvas);
    const label = document.createElement('div');
    label.className = 'label';
    const name = `${prefix}_${screen.file.replace('raw/', '').replace('.png', '')}`;
    label.textContent = name + '.png';
    div.appendChild(label);
    container.appendChild(div);

    canvas.onclick = () => download(canvas, name);
    await drawFrame(canvas, screen, W, H);
  }
}

function download(canvas, name) {
  const link = document.createElement('a');
  link.download = name + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadAll(prefix) {
  const container = document.getElementById(prefix === 'phone' ? 'phone-row' : prefix === 'tablet7' ? 'tablet7-row' : 'tablet10-row');
  container.querySelectorAll('canvas').forEach((c, i) => {
    setTimeout(() => download(c, `${prefix}_${SCREENS[i].file.replace('raw/', '').replace('.png', '')}`), i * 200);
  });
}

function downloadFeature() {
  download(document.getElementById('feature'), 'feature_graphic');
}

// Generate all
window.addEventListener('load', async () => {
  await drawFeature();
  await generateScreenshots('phone-row', 1080, 1920, 'phone');
  await generateScreenshots('tablet7-row', 1200, 1920, 'tablet7');
  await generateScreenshots('tablet10-row', 1600, 2560, 'tablet10');
});
</script>
</body>
</html>
