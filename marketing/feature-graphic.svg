<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1410"/>
      <stop offset="100%" stop-color="#142018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D8B5E"/>
      <stop offset="100%" stop-color="#3DB676"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C2D24"/>
      <stop offset="100%" stop-color="#142018"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#3DB676" stroke-width="0.5" fill="none">
    <line x1="0" y1="0" x2="1024" y2="500"/>
    <line x1="200" y1="0" x2="1024" y2="412"/>
    <line x1="400" y1="0" x2="1024" y2="312"/>
    <line x1="0" y1="100" x2="1024" y2="500"/>
    <line x1="0" y1="200" x2="924" y2="500"/>
    <line x1="0" y1="300" x2="724" y2="500"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="820" cy="100" r="180" fill="#2D8B5E" opacity="0.06"/>
  <circle cx="900" cy="350" r="120" fill="#3DB676" opacity="0.04"/>
  <circle cx="150" cy="420" r="100" fill="#2D8B5E" opacity="0.04"/>

  <!-- Logo mark (bahay kubo simplified) -->
  <g transform="translate(80, 120) scale(1.8)">
    <line x1="54" y1="18" x2="20" y2="43" stroke="#55C48A" stroke-width="4" stroke-linecap="butt"/>
    <line x1="46" y1="18" x2="80" y2="43" stroke="#55C48A" stroke-width="4" stroke-linecap="butt"/>
    <polygon points="50,25 30,40 70,40" fill="#E8EDE9"/>
    <rect x="24" y="39.5" width="52" height="2" fill="#E8EDE9"/>
    <polygon points="26,43 33,43 33,63 29,63" fill="#E8EDE9"/>
    <path d="M 34.5 43 H 65.5 V 63 H 55.5 V 51 H 44.5 V 63 H 34.5 Z" fill="#E8EDE9"/>
    <polygon points="67,43 74,43 71,63 67,63" fill="#E8EDE9"/>
    <rect x="28.5" y="64.5" width="43" height="2.5" fill="#E8EDE9"/>
    <rect x="34" y="67" width="3.5" height="5" fill="#E8EDE9"/>
    <rect x="48" y="67" width="3.5" height="5" fill="#E8EDE9"/>
    <rect x="62" y="67" width="3.5" height="5" fill="#E8EDE9"/>
    <rect x="24" y="72" width="52" height="2.5" fill="#E8EDE9"/>
  </g>

  <!-- App name -->
  <text x="80" y="325" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">
    <tspan fill="#F3F6F4">Sandal</tspan><tspan fill="#3DB676">an</tspan>
  </text>

  <!-- Tagline -->
  <text x="82" y="365" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#8A948D" font-weight="500" letter-spacing="0.5">
    Gabay sa Bawat Hakbang
  </text>

  <!-- Subtitle -->
  <text x="82" y="405" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#6B7B71" font-weight="400">
    Your Filipino adulting companion &amp; finance tracker
  </text>

  <!-- Right side: App preview cards -->
  <!-- Card 1: Transaction -->
  <g transform="translate(520, 60)">
    <rect width="220" height="70" rx="12" fill="url(#cardGrad)" stroke="#2D8B5E" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="28" font-family="system-ui, sans-serif" font-size="11" fill="#8A948D" font-weight="500">TODAY</text>
    <text x="16" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#F3F6F4" font-weight="600">Grocery Run</text>
    <text x="204" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#FF6467" font-weight="700" text-anchor="end">-P1,247</text>
  </g>

  <!-- Card 2: Budget -->
  <g transform="translate(560, 150)">
    <rect width="220" height="70" rx="12" fill="url(#cardGrad)" stroke="#2D8B5E" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="28" font-family="system-ui, sans-serif" font-size="11" fill="#8A948D" font-weight="500">BUDGET</text>
    <text x="16" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#F3F6F4" font-weight="600">Food &amp; Dining</text>
    <text x="204" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#3DB676" font-weight="700" text-anchor="end">P4,200/P8,000</text>
    <!-- Progress bar -->
    <rect x="16" y="56" width="188" height="4" rx="2" fill="#1C2D24"/>
    <rect x="16" y="56" width="99" height="4" rx="2" fill="#3DB676"/>
  </g>

  <!-- Card 3: Goal -->
  <g transform="translate(520, 240)">
    <rect width="220" height="70" rx="12" fill="url(#cardGrad)" stroke="#2D8B5E" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="28" font-family="system-ui, sans-serif" font-size="11" fill="#8A948D" font-weight="500">SAVINGS GOAL</text>
    <text x="16" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#F3F6F4" font-weight="600">Emergency Fund</text>
    <text x="204" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#3DB676" font-weight="700" text-anchor="end">62%</text>
    <!-- Progress bar -->
    <rect x="16" y="56" width="188" height="4" rx="2" fill="#1C2D24"/>
    <rect x="16" y="56" width="117" height="4" rx="2" fill="#3DB676"/>
  </g>

  <!-- Card 4: AI Chat -->
  <g transform="translate(560, 330)">
    <rect width="220" height="70" rx="12" fill="url(#cardGrad)" stroke="#2D8B5E" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="28" font-family="system-ui, sans-serif" font-size="11" fill="#8A948D" font-weight="500">AI ASSISTANT</text>
    <text x="16" y="48" font-family="system-ui, sans-serif" font-size="13" fill="#F3F6F4" font-weight="500">"lunch 250, transpo 50"</text>
    <text x="204" y="48" font-family="system-ui, sans-serif" font-size="12" fill="#3DB676" font-weight="600" text-anchor="end">Logged!</text>
  </g>

  <!-- Floating badges -->
  <g transform="translate(770, 80)">
    <rect width="170" height="36" rx="18" fill="#2D8B5E" opacity="0.15"/>
    <text x="85" y="23" font-family="system-ui, sans-serif" font-size="12" fill="#3DB676" font-weight="600" text-anchor="middle">SSS Calculator</text>
  </g>
  <g transform="translate(790, 270)">
    <rect width="160" height="36" rx="18" fill="#2D8B5E" opacity="0.15"/>
    <text x="80" y="23" font-family="system-ui, sans-serif" font-size="12" fill="#3DB676" font-weight="600" text-anchor="middle">Receipt Scanner</text>
  </g>
  <g transform="translate(770, 420)">
    <rect width="180" height="36" rx="18" fill="#2D8B5E" opacity="0.15"/>
    <text x="90" y="23" font-family="system-ui, sans-serif" font-size="12" fill="#3DB676" font-weight="600" text-anchor="middle">Adulting Guide</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="494" width="1024" height="6" fill="url(#accent)"/>
</svg>
